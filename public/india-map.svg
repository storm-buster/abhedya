<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 550" fill="none">
  <defs>
    <filter id="map-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.6 0 0.9 0 0
                0   0 0.6 0 0
                0.8 0 1.0 0 0
                0   0 0   0.8 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="map-fill-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b2fbe" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#9b4dff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#4dc9f6" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

